<style>
  :root {

    --text: #1a1a2e;
    --muted: #6b6b8a;
    --border: #e4e0d8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: #1a1a2e;
    padding: 2.2rem 2.5rem 1.8rem;
  }
  header h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.65rem;
    color: #fff;
    line-height: 1.3;
  }
  header p {
    color: rgba(255,255,255,0.5);
    font-size: 0.78rem;
    margin-top: 0.4rem;
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 0.8rem;
    padding: 1rem 2.5rem;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .controls input, .controls select {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    padding: 0.5rem 0.9rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
  }
  .controls input { flex: 1; min-width: 180px; }
  .controls input:focus, .controls select:focus { border-color: #1a1a2e; }
  .stat {
    margin-left: auto;
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 500;
  }
  .stat b { color: var(--text); }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding: 1rem 2.5rem 0.8rem;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    color: var(--muted);
    cursor: pointer;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    border: 1.5px solid transparent;
    transition: all 0.15s;
  }
  .legend-item:hover { border-color: currentColor; opacity: 0.8; }
  .legend-item.active { border-color: currentColor; font-weight: 600; }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* MAIN CONTENT */
  .content {
    padding: 1.5rem 2.5rem 4rem;
  }

  /* THEME BLOCK */
  .theme-block {
    margin-bottom: 2.5rem;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--white);
    transition: opacity 0.2s;
  }
  .theme-block.hidden { display: none; }

  .theme-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.9rem 1.2rem;
    cursor: pointer;
    user-select: none;
  }
  .theme-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .theme-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 0.95rem;
    font-weight: 700;
  }
  .theme-count {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.15rem 0.55rem;
    border-radius: 20px;
    margin-left: auto;
  }
  .theme-toggle {
    font-size: 0.75rem;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .theme-block.collapsed .theme-toggle { transform: rotate(-90deg); }

  /* TABLE */
  .table-wrap {
    overflow-x: auto;
    border-top: 1px solid var(--border);
  }
  .theme-block.collapsed .table-wrap { display: none; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.79rem;
    min-width: 700px;
  }
  thead th {
    padding: 0.55rem 1rem;
    text-align: left;
    font-weight: 600;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.02);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(0,0,0,0.025); }
  td {
    padding: 0.65rem 1rem;
    vertical-align: top;
    line-height: 1.5;
  }
  td:first-child {
    text-align: center;
    font-size: 0.68rem;
    color: var(--muted);
    font-weight: 600;
    width: 36px;
  }
  .ilce-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.12rem 0.45rem;
    border-radius: 20px;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }

  .okul-cell { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }
  .tel-cell { font-size: 0.73rem; color: var(--muted); white-space: nowrap; }
  .konu-cell { color: var(--text); max-width: 320px; font-size: 0.76rem; line-height: 1.5; }

  .no-result {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  @media (max-width: 600px) {
    .content { padding: 1rem; }
    .controls, .legend { padding: 0.8rem 1rem; }
    header { padding: 1.5rem 1rem; }
  }
</style>

// Build legend & theme filter
const legendEl = document.getElementById('legend');
const filterSel = document.getElementById('themeFilter');

THEMES.forEach(t => {
  // legend item
  const li = document.createElement('div');
  li.className = 'legend-item';
  li.dataset.id = t.id;
  li.innerHTML = `<span class="legend-dot" style="background:${t.color}"></span>${t.title}`;
  li.addEventListener('click', () => {
    filterSel.value = String(t.id);
    filterSel.dispatchEvent(new Event('change'));
  });
  legendEl.appendChild(li);

  // select option
  const opt = document.createElement('option');
  opt.value = t.id; opt.textContent = `Tema ${t.id}: ${t.title}`;
  filterSel.appendChild(opt);
});

// Build all theme blocks
const content = document.getElementById('content');

function buildContent() {
  content.innerHTML = '';
  THEMES.forEach(t => {
    const block = document.createElement('div');
    block.className = 'theme-block';
    block.dataset.id = t.id;

    // header
    const h = document.createElement('div');
    h.className = 'theme-header';
    h.style.background = t.light;
    h.innerHTML = `
      <span class="theme-dot" style="background:${t.color}"></span>
      <span class="theme-title" style="color:${t.color}">Tema ${t.id} — ${t.title}</span>
      <span class="theme-count" style="background:${t.color};color:#fff">${t.rows.length} kayıt</span>
      <span class="theme-toggle" style="color:${t.color}">▼</span>
    `;
    h.addEventListener('click', () => block.classList.toggle('collapsed'));
    block.appendChild(h);

    // table
    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    const table = document.createElement('table');
    table.innerHTML = `
      <thead><tr>
        <th>#</th>
        <th>İlçe</th>
        <th>Okul</th>
        <th>Ad Soyad</th>
        <th>Telefon</th>
        <th>Bildiri / Konu</th>
      </tr></thead>
      <tbody></tbody>`;
    const tbody = table.querySelector('tbody');

    t.rows.forEach((row, i) => {
      const tr = document.createElement('tr');
      tr.dataset.search = (row.ilce+row.okul+row.ad+row.tel+row.konu).toLowerCase();
      tr.innerHTML = `
        <td>${i+1}</td>
        <td><span class="ilce-badge" style="background:${t.light};color:${t.color};border:1px solid ${t.color}33">${row.ilce}</span></td>
        <td><div class="ad-cell">${row.okul}</div></td>
        <td><div class="ad-cell">${row.ad}</div></td>
        <td class="tel-cell">${row.tel}</td>
        <td class="konu-cell">${row.konu}</td>
      `;
      tbody.appendChild(tr);
    });

    wrap.appendChild(table);
    block.appendChild(wrap);
    content.appendChild(block);
  });
}

buildContent();

// Filter & search logic
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const tid = document.getElementById('themeFilter').value;

  let shown = 0;
  document.querySelectorAll('.theme-block').forEach(block => {
    const matchTheme = !tid || block.dataset.id === tid;
    if (!matchTheme) { block.classList.add('hidden'); return; }
    block.classList.remove('hidden');

    let blockVisible = 0;
    block.querySelectorAll('tbody tr').forEach(tr => {
      const text = tr.dataset.search.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
      const match = !q || text.includes(q);
      tr.style.display = match ? '' : 'none';
      if (match) { blockVisible++; shown++; }
    });

    // hide block if all rows hidden
    if (blockVisible === 0 && q) block.classList.add('hidden');
  });

  document.getElementById('countShown').textContent = shown;
  document.getElementById('noResult').style.display = shown === 0 ? 'block' : 'none';
  content.style.display = shown === 0 ? 'none' : '';

  // update legend active
  document.querySelectorAll('.legend-item').forEach(li => {
    li.classList.toggle('active', li.dataset.id === tid);
  });
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('themeFilter').addEventListener('change', applyFilters);
</script>
